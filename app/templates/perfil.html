<!-- Esta es la pagina del perfil del usuario logueado -->
<!-- Usa index.html para cargar la parte del código que es común a todas las páginas del sitio -->
{% extends 'index.html' %}
<!-- Cargamos el modulo static para poder referenciar archivos estaticos como CSS e imagenes -->
{% load static %}
<!-- Cargamos el CSS especifico de esta pagina, que se suma al styles.css del index -->
{% block css %}
<link rel="stylesheet" href="{% static 'css/style_perfil.css' %}">
{% endblock %}
<!-- Definimos el titulo que queremos cargar para esta página -->
{% block titulo %}Perfil{% endblock %}
<!-- Dentro de este otro bloque vamos a codear el contenido que queremos mostrar en esta vista -->
{% block contenido %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">

            <h2>Mi perfil</h2>
            <p class="text-muted mb-4">ID de usuario: <strong>#{{ request.user.id }}</strong></p>

            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" value="{{ request.user.username }}">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ request.user.email }}">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ perfil.nombre }}">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Apellido</label>
                        <input type="text" name="apellido" class="form-control" value="{{ perfil.apellido }}">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Calle</label>
                        <input type="text" name="calle" class="form-control" value="{{ perfil.calle }}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Altura</label>
                        <input type="number" name="altura" class="form-control" value="{{ perfil.altura }}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">Código Postal</label>
                        <input type="number" name="codigoPostal" class="form-control" value="{{ perfil.codigoPostal }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Entre calles</label>
                        <input type="text" name="entreCalles" class="form-control" value="{{ perfil.entreCalles }}">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Localidad</label>
                        <input type="text" name="localidad" class="form-control" value="{{ perfil.localidad }}">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Provincia</label>
                        <input type="text" name="provincia" class="form-control" value="{{ perfil.provincia }}">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">País</label>
                        <input type="text" name="pais" class="form-control" value="{{ perfil.pais }}">
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-between align-items-center">
                    <button type="submit" class="btn btn-dark">Guardar cambios</button>
                    <button type="submit" name="eliminar" value="1" class="btn btn-outline-danger"
                        onclick="return confirm('¿Estás segura de que querés eliminar tu cuenta? Esta acción no se puede deshacer.')">
                        Eliminar cuenta
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock %}
