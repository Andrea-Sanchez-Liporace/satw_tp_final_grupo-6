<!-- Esta es la pagina del perfil del usuario logueado -->
<!-- Usa index.html para cargar la parte del código que es común a todas las páginas del sitio -->
{% extends 'index.html' %}
<!-- Cargamos el modulo static para poder referenciar archivos estaticos como CSS e imagenes -->
{% load static %}
<!-- Cargamos el CSS especifico de esta pagina, que se suma al styles.css del index -->
{% block css %}
<link rel="stylesheet" href="{% static 'css/style_perfil.css' %}">
{% endblock %}
<!-- Definimos el titulo que queremos cargar para esta página -->
{% block titulo %}Perfil{% endblock %}
<!-- Dentro de este otro bloque vamos a codear el contenido que queremos mostrar en esta vista -->
{% block contenido %}
    <h2>Mi perfil</h2>
    <p>Datos del usuario logueado</p>
{% endblock %}
